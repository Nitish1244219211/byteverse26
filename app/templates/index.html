    {% extends 'base.html' %}
    {% block title %}
      Home
    {% endblock title %}
    {% block body %}      
      
    <div class="container col-md-6 col-lg-5"id="form" >
      <form class="mt-3 pt-5 pb-5 p-3" action="/" method="POST">
        <h4>
<b>          Tell us about yourself
</b>        </h4>
        <div class="form-text mb-3">So we can provide you precise information</div>
        <div class="mb-3">
          <label for="name" >Enter Your Name</label>
          <input type="text" name="name" class="form-control" id="name" required>
          <div class="form-text">We'll never share your details with anyone else.</div>
        </div>
    <div class="row">
      <div class="form-group col-md-3">
        <label for="age" class="mb-2">Age</label><br>
        <input type="number" name="age" class="form-control" id="Age" max="150" min="0" required>
      </div>
    
      <div class="form-group gender-box col-md">
        <label for="sex">Sex at birth</label><br>
        <button type="button" class="gender-btn ms-3" onclick="selectGender(this, 'Male')">♂ Male</button>
        <button type="button" class="gender-btn ms-3" onclick="selectGender(this, 'Female')">♀ Female</button>
        <button type="button" class="gender-btn ms-3" onclick="selectGender(this, 'Other')">⚥ Other </button>
        <input type="hidden" name="sex" id="sexInput">
    </div>
    </div>
 <div class="mb-3">
          <label for="name" >Enter Your Mobile</label>
      <input type="tel" name="mobile" maxlength="10" minlength="10" id="typePhone" class="form-control" />
        </div>
        <div class="mb-3">
          <label for="Symptoms" class="form-label">Symptoms</label>
          <input type="text" id="search" class="form-control" placeholder="Type symptom...">
          <input type="hidden" name="Symptoms" id="hiddenSymptoms">
          <div class="form-text">Feel free to share your Symptoms</div>
<div id="suggestions"></div>

<div id="selected"></div>




</div>
      
        <button type="submit" class="btn" style="background-color: #c2e7ff;">Submit</button>
      </form>
    
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    {% endblock body %}
